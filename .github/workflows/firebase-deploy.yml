name: Deploy to Firebase Production

on:
  push:
    branches: [main]

concurrency:
  group: firebase-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Install Cloud Functions dependencies
        run: npm ci
        working-directory: functions

      - name: Build frontend
        run: npm run build

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy Hosting, Functions, and Firestore rules
        run: firebase deploy --only hosting,functions,firestore:rules --project hemetvalleytools --non-interactive